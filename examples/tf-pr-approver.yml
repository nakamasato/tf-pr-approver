# Example config for tf-pr-approver.
# Place this at .github/tf-pr-approver.yml in your Terraform repository.
#
# Evaluation happens in two stages:
#   1. scope check — the PR must not change anything outside `target_paths`
#   2. plan rules  — every plan JSON must match at least one rule
#
# Stage 1 short-circuits: a PR that also touches application code is never
# auto-approved, however safe its terraform plan looks.
#
# `include` lists what the PR may touch; `exclude` carves paths back out and
# takes precedence. Negated ("!") patterns are rejected — use `exclude`.
# An `exclude` written without an `include` puts NOTHING in scope, so nothing
# is ever approved. That is deliberate: an incomplete scope must fail closed.
target_paths:
  include:
    # Prefer a directory over `**/*.tf`: the latter leaves terraform.tfvars and
    # .terraform.lock.hcl out of scope, so version bumps stop being approved.
    - terraform/**
    - docs/**
    - '**/*.md'
  exclude:
    # Production stays under human review, however safe the plan looks.
    - terraform/prod/**

# Rules are OR'd: a plan is considered "safe" if it matches at least ONE rule.
# Within a rule, all conditions under `when` must hold (AND).
rules:
  # Approve when the plan has no infrastructure changes at all
  # (equivalent to `terraform plan` printing "No changes").
  - name: no-changes
    when:
      no_changes: true

  # Approve when only bucket policies are updated, and nothing is deleted.
  - name: safe-policy-updates
    when:
      denied_actions: [delete]
      allowed_actions: [update]
      allowed_resource_types:
        - aws_s3_bucket_policy

  # Approve tag-only style changes across a fixed set of resource types,
  # as long as nothing is destroyed.
  - name: additive-only
    when:
      denied_actions: [delete]
      allowed_actions: [create, update]
      denied_resource_types:
        - aws_iam_role
        - aws_iam_policy
