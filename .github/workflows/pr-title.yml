# PRs are squash-merged, so the PR title becomes the commit message on main and
# is what release-please reads to decide the next version. A title that is not a
# Conventional Commit would silently produce no release.
name: pr-title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
