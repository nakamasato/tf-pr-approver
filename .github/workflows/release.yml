# Release automation.
#
# release-please watches main for Conventional Commits and keeps a release PR
# up to date. Merging that PR bumps package.json, updates CHANGELOG.md, and
# creates the immutable tag (e.g. v1.2.3) plus its GitHub Release.
#
# The second job then moves the mutable major tag (e.g. v1) onto that release,
# so consumers pinning `@v1` pick up the new version automatically. Moving a tag
# needs --force, which is unrelated to the no-force-push rule on main: that rule
# only covers refs/heads/main, while this touches refs/tags/v1.
name: release

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
    steps:
      - uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-major-tag:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Point v<major> at the new release
        env:
          MAJOR_TAG: v${{ needs.release-please.outputs.major }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f -a "$MAJOR_TAG" -m "Release $RELEASE_TAG"
          git push origin "refs/tags/$MAJOR_TAG" --force
