# Ensures the committed dist/ bundle matches the current source.
# A GitHub Action runs the committed dist/, so a stale bundle would silently
# ship old behavior. This job rebuilds and fails if dist/ would change.
name: check-dist

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run package
      - name: Compare committed dist/ with freshly built dist/
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt 0 ]; then
            echo "Detected uncommitted changes after build. See diff below."
            git diff --text dist/
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/
