name: 'Terraform Auto Approver'
description: >-
  Auto-approve Terraform pull requests when the terraform plan JSON matches
  declarative safety rules, so the approval counts toward required reviews.
author: 'Masato Naka'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  github-token:
    description: >-
      Token with `pull-requests: write`. Either the default GITHUB_TOKEN (needs
      "Allow GitHub Actions to create and approve pull requests" enabled at the
      org and repo level) or a GitHub App installation token minted in your
      workflow with actions/create-github-app-token. See docs/authentication.md
      for the trade-off between the two.
    required: true
  plan-files:
    description: >-
      Glob pattern(s) or newline-separated paths to the terraform plan JSON
      file(s) to evaluate (produced by `terraform show -json <planfile>`).
      Every matched plan must satisfy at least one rule for the PR to be approved.
    required: true
  config:
    description: 'Path to the rules config YAML.'
    required: false
    default: '.github/tf-pr-approver.yml'
  allow-empty-plans:
    description: >-
      Treat "no plan file matched" as OK instead of failing the job. Enable it
      when a PR that is in scope can legitimately produce no plan JSON
      (e.g. a docs-only change in a monorepo). Requires `target_paths` in the
      config: without a scope check an empty plan set would approve any PR.
    required: false
    default: 'false'
  pull-request-number:
    description: >-
      Pull request number to approve. Defaults to the PR from the event context.
    required: false
    default: ''
  approve-message:
    description: 'Body text used for the approval review.'
    required: false
    default: 'Auto-approved by tf-pr-approver: the terraform plan matched the configured safe-change rules.'

outputs:
  approved:
    description: '"true" if the PR was approved (or already approved), "false" otherwise.'
  matched-rules:
    description: 'JSON object mapping each evaluated plan file to the rule name it matched (or null).'
  out-of-scope-files:
    description: 'JSON array of changed files outside `target_paths` (empty when the scope check passed).'

runs:
  using: 'node24'
  main: 'dist/index.js'
